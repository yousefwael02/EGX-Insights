name: CD

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        # RENDER_DEPLOY_HOOK_URL is found in Render dashboard:
        # Service → Settings → Deploy Hook → Copy URL
        run: |
          curl -fsSL --retry 3 --retry-delay 5 \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -o /dev/null \
            -w "HTTP status: %{http_code}\n"

  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (production)
        # Required secrets (set in GitHub repo → Settings → Secrets):
        #   VERCEL_TOKEN     — from vercel.com/account/tokens
        #   VERCEL_ORG_ID    — run `vercel whoami --json` or check .vercel/project.json
        #   VERCEL_PROJECT_ID — run `vercel link` locally, then check .vercel/project.json
        run: |
          vercel deploy --prod \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
