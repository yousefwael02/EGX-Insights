name: CD

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository_owner }}/stockinsight-backend
  IMAGE_FRONTEND: ${{ github.repository_owner }}/stockinsight-frontend

jobs:
  publish-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:latest

  deploy-k8s:
    runs-on: ubuntu-latest
    needs: publish-images
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config

      - name: Deploy manifests
        run: |
          kubectl apply -f deploy/k8s/namespace.yaml
          kubectl apply -f deploy/k8s/configmap.yaml
          kubectl apply -f deploy/k8s/secrets.yaml
          kubectl apply -f deploy/k8s/backend-deployment.yaml
          kubectl apply -f deploy/k8s/frontend-deployment.yaml
          kubectl apply -f deploy/k8s/services.yaml
          kubectl apply -f deploy/k8s/ingress.yaml

      - name: Update image tags
        run: |
          TAG=${GITHUB_SHA::7}
          kubectl -n stockinsight set image deployment/backend backend=ghcr.io/${{ github.repository_owner }}/stockinsight-backend:${TAG}
          kubectl -n stockinsight set image deployment/frontend frontend=ghcr.io/${{ github.repository_owner }}/stockinsight-frontend:${TAG}
          kubectl -n stockinsight rollout status deployment/backend --timeout=120s
          kubectl -n stockinsight rollout status deployment/frontend --timeout=120s
