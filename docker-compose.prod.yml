services:
  backend:
    image: ghcr.io/${GITHUB_OWNER}/stockinsight-backend:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - ./Backend/.env
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB: ${MONGODB_DB}
      CORS_ORIGINS: ${CORS_ORIGINS}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - mongodb
      - redis

  frontend:
    image: ghcr.io/${GITHUB_OWNER}/stockinsight-frontend:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      - backend

  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/vps/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro

volumes:
  mongo_data:
