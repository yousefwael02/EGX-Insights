apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: stockinsight
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/owner/stockinsight-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: stockinsight-config
            - secretRef:
                name: stockinsight-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 768Mi
