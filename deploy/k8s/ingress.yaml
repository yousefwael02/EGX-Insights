apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stockinsight-ingress
  namespace: stockinsight
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 5m
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - stockinsight.example.com
      secretName: stockinsight-tls
  rules:
    - host: stockinsight.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
