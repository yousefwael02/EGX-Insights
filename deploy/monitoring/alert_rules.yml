groups:
  - name: stockinsight-alerts
    rules:
      - alert: BackendHighErrorRate
        expr: sum(rate(http_requests_total{handler!="/metrics",status=~"5.."}[5m])) / sum(rate(http_requests_total{handler!="/metrics"}[5m])) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Backend error rate is above 5%

      - alert: BackendHighLatencyP95
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Backend p95 latency is above 1s
